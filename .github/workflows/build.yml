name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK and capture errors
        run: |
          # Run gradle, capture output
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log || true
          
          # Emit error annotations (visible in PR/commit checks)
          grep -E "^(e:|error:|ERROR)" /tmp/gradle.log | while IFS= read -r line; do
            echo "::error::$line"
          done
          
          # Also print the failure section
          grep -A3 "FAILURE\|What went wrong\|Caused by" /tmp/gradle.log | while IFS= read -r line; do
            echo "::warning::$line"
          done
          
          # Fail if no APK
          find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -q . || {
            echo "::error::No APK produced!"
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridRPG-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Grid RPG - Build ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: "🌳 Grid RPG APK - Build #${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
