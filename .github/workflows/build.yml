name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        id: gradle_build
        run: |
          ./gradlew assembleDebug --no-daemon --rerun-tasks 2>&1 | tee build.log || true
          
          # Print errors to step summary (visible in GitHub UI)
          echo "## Build Log - Errors" >> $GITHUB_STEP_SUMMARY
          grep -E "^(ERROR|FAILED|> Task|Caused by|Exception)" build.log | head -40 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Last 60 lines" >> $GITHUB_STEP_SUMMARY
          tail -60 build.log >> $GITHUB_STEP_SUMMARY
          
          # Check if APK was produced
          if find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -q .; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload APK artifact
        if: steps.gradle_build.outputs.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GridRPG-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release with APK
        if: steps.gradle_build.outputs.BUILD_SUCCESS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Grid RPG - Build ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            🌳 **Grid RPG** - APK Android
            Build #${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
