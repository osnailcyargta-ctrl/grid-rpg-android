name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # No cache - fresh build every time

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --rerun-tasks

      - name: List APK output
        run: find app/build/outputs/apk -name "*.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridRPG-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Grid RPG - Build ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
          body: |
            🌳 **Grid RPG** - APK Android
            
            Build #${{ github.run_number }}
            
            **Cara install:**
            1. Download `app-debug.apk` di bawah
            2. Aktifkan "Install from unknown sources" di pengaturan Android
            3. Install APK-nya
            
            **Gameplay:**
            - Grid 5x5, karakter snap ke grid
            - Gerak di area 3x3 tengah, enemy spawn di tepi luar
            - Wave timer 30 detik, tiap 5 wave pilih upgrade
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
