name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkey -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: grid-rpg-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success() && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: "Grid RPG v${{ github.run_number }}"
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: false
          body: "APK build dari commit ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
