name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: List res files
        run: |
          echo "=== Mipmap files ==="
          find app/src/main/res/mipmap* -type f | sort
          echo "=== Drawable files ==="
          ls app/src/main/res/drawable/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find APK
        run: find app/build/outputs -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridRPG-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Grid RPG - Build ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            🌳 **Grid RPG** - APK Android
            Build #${{ github.run_number }}
            
            Download `app-debug.apk`, aktifkan install unknown sources, install.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
